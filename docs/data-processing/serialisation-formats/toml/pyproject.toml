[tool.black]
line-length = 79

[tool.isort]
atomic = true
multi_line_output = 3
use_parentheses = true
include_trailing_comma = true
force_grid_wrap = 0
lines_after_imports = 2
lines_between_types = 1
known_third_party = [ "mpi4py", "numpy", "requests" ]
known_first_party = [ "MY_FIRST_MODULE", "MY_SECOND_MODULE" ]
not_skip = "__init__.py"
